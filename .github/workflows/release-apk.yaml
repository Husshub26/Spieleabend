name: Release APK on Version Bump

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'pubspec.yaml'

permissions:
  contents: write
  packages: read

jobs:
  check-version:
    name: Check Version Change
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      version_changed: ${{ steps.check_version.outputs.changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Get current version
        id: get_version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if version changed
        id: check_version
        run: |
          if git diff HEAD~1 pubspec.yaml | grep -q "version:"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Version changed detected"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⚠️ No version change detected in pubspec.yaml"
          fi

  build-and-release:
    name: Build and Release APK
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.8

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git protobuf-compiler curl unzip

      - name: Install Android NDK 28.2.13676358
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;28.2.13676358"

      - name: Activate protoc plugin
        run: |
          dart pub global activate protoc_plugin
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Get app name and version from pubspec.yaml
        id: app_info
        run: |
          APP_NAME=$(grep '^name: ' pubspec.yaml | awk '{print $2}')
          VERSION=$(grep '^version: ' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "app_name=$APP_NAME" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "App: $APP_NAME v$VERSION"

      - name: Build APK (Release)
        run: flutter build apk --release --no-tree-shake-icons

      - name: Generate changelog
        id: changelog
        run: |
          set -e
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %h %s" | grep -E "^- [0-9a-f]+ (feat|fix)" || true)
          else
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"- %h %s" | grep -E "^- [0-9a-f]+ (feat|fix)" || true)
          fi
          if [ -z "$COMMITS" ]; then
            COMMITS="No feat or fix commits since last release."
          fi
          echo "Generated changelog:"
          echo "$COMMITS"
          {
            echo 'changelog<<EOF'
            echo "$COMMITS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.version }}
          name: Release v${{ env.version }}
          body: |
            ## ${{ env.app_name }} v${{ env.version }}

            ### Changelog
            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [check-version, build-and-release]
    if: always()
    steps:
      - name: Print Status
        run: |
          echo "✅ APK Release Workflow Complete"
          echo "Version: ${{ needs.check-version.outputs.version }}"